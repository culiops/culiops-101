name: Deploy to ECS Fargate

# Trigger: every push to main deploys. workflow_dispatch lets you also run it by hand.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# OIDC needs id-token:write to mint the token GitHub presents to AWS.
# contents:read is the least the checkout step needs. Nothing else.
# Omit id-token:write and configure-aws-credentials fails with "Not authorized
# to perform sts:AssumeRoleWithWebIdentity" — the #1 first-run gotcha.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: hello-fargate
  ECS_CLUSTER: hello-fargate-cluster
  ECS_SERVICE: hello-fargate-svc
  ECS_FAMILY: hello-fargate
  CONTAINER_NAME: hello

# Never run two deploys at once — the second would race the first's rollout.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push, and roll the service
    runs-on: ubuntu-latest
    steps:
      # Every action is pinned to a full commit SHA, not a tag. A tag (even a
      # semver one like v6.2.1) is a MOVABLE pointer — whoever controls the
      # action's repo, or an attacker who compromises it, can re-point the tag to
      # malicious code and your next run pulls it silently (this is how the
      # tj-actions/changed-files supply-chain attack leaked CI secrets). A commit
      # SHA is immutable. The trailing "# v6.2.1" comment keeps it readable;
      # Dependabot bumps the SHAs when new versions ship.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # THE point of this video: no aws_access_key_id anywhere. GitHub presents a
      # short-lived OIDC token, AWS hands back short-lived STS creds. Nothing is stored.
      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Proof shot for the video: this prints the assumed role, and there is not a
      # single secret key involved.
      - name: Who am I? (temporary creds, zero secrets)
        run: aws sts get-caller-identity

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      # Immutable tag = the git SHA. Never :latest — "redeploy the old build" must
      # mean the SAME bytes. The CI enforces what discipline used to (scar #3 of the
      # docker-to-fargate video), so a human can't forget.
      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build --platform linux/amd64 -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      # Read the CURRENTLY registered task def, so we keep its roles / log config /
      # health check and swap ONLY the image. describe-task-definition returns
      # read-only fields that register-task-definition rejects — strip them, or the
      # deploy fails with a confusing "unexpected key" error.
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition --task-definition "$ECS_FAMILY" \
            --query 'taskDefinition' --output json > task-definition.raw.json
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)' \
            task-definition.raw.json > task-definition.json

      # Swap the image AND stamp APP_VERSION with the SHA, so refreshing the live URL
      # visibly shows the new version — the payoff shot.
      - name: Render new image into the task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@138c24f321fdbdf7edee4a685519d253cae2cdea # v1.9.0
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}
          environment-variables: |
            APP_VERSION=${{ github.sha }}

      # Register the new revision, update the service, and BLOCK until ECS reports
      # stable. If the new tasks fail their health check, the deployment circuit
      # breaker (configured on the service) rolls back automatically.
      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@c465972ecbd160473f22e683363b422a5412a3de # v2.6.3
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
